name: Task PR

on:
  pull_request:
    paths:
      - "tasks/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-changed-tasks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - run: git lfs pull
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.87.0"
          components: clippy, rustfmt
      - run: cargo install cargo-audit --version 0.21.2 --locked
      - run: pip install -e ".[dev,test]"
      - name: Find changed task directories
        id: tasks
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.sha }}"
          mapfile -t CHANGED < <(
            git diff --name-only "$BASE" "$HEAD" -- 'tasks/v1/*/' \
              | awk -F/ '{print $1"/"$2"/"$3}' | sort -u
          )
          if [ ${#CHANGED[@]} -eq 0 ]; then
            echo "none=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf '%s\n' "${CHANGED[@]}"
          {
            echo "dirs<<EOF"
            printf '%s\n' "${CHANGED[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Validate changed tasks
        if: steps.tasks.outputs.none != 'true'
        run: |
          while IFS= read -r dir; do
            [ -d "$dir" ] || continue
            echo "==> $dir"
            python scripts/validate_tasks.py "$dir"
          done <<< "${{ steps.tasks.outputs.dirs }}"
      - name: Label task PR
        if: steps.tasks.outputs.none != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['task']
            })
