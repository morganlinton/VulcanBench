# Local development stack only. This file is NOT a production deployment path:
# credentials default to dev values and ports bind to localhost. For production,
# use docker-compose.prod.yml and docs/DEPLOYMENT.md.

services:
  db:
    image: postgres:16-alpine@sha256:79950da386bda7fcc9d57aa9aa9be6c6d7407596a9b8f68014b09a778a9ab316
    environment:
      POSTGRES_USER: vulcanbench
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vulcanbench_dev}  # override via .env (see .env.example)
      POSTGRES_DB: vulcanbench
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vulcanbench"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
